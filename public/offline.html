<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0D2418">
  <title>Venueza — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Playfair+Display:wght@700&display=swap');
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(160deg, #0D2418 0%, #1B4332 40%, #2D6A4F 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 420px;
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .icon-ring {
      width: 100px; height: 100px;
      border-radius: 24px;
      background: rgba(212, 160, 23, 0.15);
      border: 2px solid rgba(212, 160, 23, 0.3);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      font-size: 44px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #fff;
    }
    .gold { color: #D4A017; }
    p {
      font-size: 14px;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 12px;
      border: none;
      background: #D4A017;
      color: #0D2418;
      font-size: 14px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(212, 160, 23, 0.3);
    }
    .retry-btn:hover {
      background: #e6b52a;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(212, 160, 23, 0.4);
    }
    .retry-btn:active { transform: translateY(0); }
    .status {
      margin-top: 32px;
      padding: 12px 20px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }
    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 6px;
      animation: blink 1.5s ease infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-ring">📡</div>
    <h1>You're <span class="gold">Offline</span></h1>
    <p>
      It seems your internet connection is unavailable right now. 
      Don't worry — your data is safe. Reconnect and try again.
    </p>
    <button class="retry-btn" onclick="window.location.reload()">
      🔄 Try Again
    </button>
    <div class="status">
      <span class="dot"></span>
      Waiting for connection...
    </div>
  </div>

  <script>
    // Auto-reload when connection is restored
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
